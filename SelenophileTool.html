<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0b0f;
    --surface: #12141a;
    --surface2: #1a1d26;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.14);
    --accent: #5b6ef5;
    --accent2: #8b6cf6;
    --text: #e8eaf2;
    --muted: #7a7e96;
    --muted2: #555972;
    --green: #3dd68c;
    --orange: #f5a623;
    --red: #f56565;
    --cyan: #38bdf8;
  }

  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 40px; border-bottom: 1px solid var(--border);
    position: sticky; top: 0; background: rgba(10,11,15,0.92);
    backdrop-filter: blur(12px); z-index: 100;
  }

  .logo {
    font-family: 'Syne', sans-serif; font-weight: 800; font-size: 22px;
    background: linear-gradient(135deg, #5b6ef5, #8b6cf6);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -0.5px;
  }

  .nav-links { display: flex; align-items: center; gap: 28px; list-style: none; }
  .nav-links a { color: var(--muted); text-decoration: none; font-size: 14px; font-weight: 500; transition: color 0.2s; }
  .nav-links a:hover { color: var(--text); }

  .search-bar {
    display: flex; align-items: center; gap: 8px; background: var(--surface);
    border: 1px solid var(--border2); border-radius: 10px; padding: 8px 16px;
    font-size: 13px; color: var(--muted); transition: border-color 0.2s; min-width: 200px;
  }
  .search-bar:hover { border-color: var(--accent); }
  .search-bar input { background: transparent; border: none; outline: none; color: var(--text); font-size: 13px; font-family: 'Inter', sans-serif; width: 100%; }
  .search-bar input::placeholder { color: var(--muted2); }

  .hero { text-align: center; padding: 64px 40px 40px; position: relative; }
  .hero::before {
    content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%);
    width: 600px; height: 300px;
    background: radial-gradient(ellipse at center top, rgba(91,110,245,0.12) 0%, transparent 70%);
    pointer-events: none;
  }

  .hero-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(91,110,245,0.1); border: 1px solid rgba(91,110,245,0.25);
    border-radius: 999px; padding: 5px 14px; font-size: 12px; color: #818cf8;
    font-weight: 500; margin-bottom: 20px; letter-spacing: 0.3px;
  }

  .hero h1 {
    font-family: 'Syne', sans-serif; font-size: 48px; font-weight: 800;
    line-height: 1.1; letter-spacing: -1.5px; margin-bottom: 14px;
    background: linear-gradient(160deg, #e8eaf2 30%, #7a7e96);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }

  .hero p { font-size: 15px; color: var(--muted); max-width: 440px; margin: 0 auto 28px; line-height: 1.7; }

  .hero-stats { display: flex; justify-content: center; gap: 40px; margin-top: 36px; padding-top: 36px; border-top: 1px solid var(--border); }
  .stat { text-align: center; }
  .stat-num { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 700; color: var(--text); }
  .stat-label { font-size: 12px; color: var(--muted); margin-top: 4px; }

  .filters { display: flex; align-items: center; gap: 8px; padding: 0 40px 24px; flex-wrap: wrap; }
  .filter-btn {
    background: var(--surface); border: 1px solid var(--border2); border-radius: 8px;
    padding: 7px 16px; font-size: 13px; font-weight: 500; color: var(--muted);
    cursor: pointer; transition: all 0.2s; font-family: 'Inter', sans-serif;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--text); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* GAME CARD GRID */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px; padding: 0 40px 60px;
  }

  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; cursor: pointer; overflow: hidden;
    transition: border-color 0.25s, transform 0.2s, background 0.2s;
    position: relative;
  }

  .card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(91,110,245,0.5), transparent);
    opacity: 0; transition: opacity 0.3s; z-index: 2;
  }

  .card:hover { border-color: var(--border2); transform: translateY(-3px); }
  .card:hover::before { opacity: 1; }

  /* GAME THUMBNAIL */
  .card-thumb-wrap { position: relative; width: 100%; aspect-ratio: 16/7; overflow: hidden; background: #0d0f14; }

  .card-thumb {
    width: 100%; height: 100%; object-fit: cover;
    display: block; transition: opacity 0.3s;
  }

  .card-thumb-placeholder {
    transition: opacity 0.3s;
  }

  .card-body { padding: 16px 18px 18px; }

  .card-top {
    display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px;
  }

  .card-badge {
    font-size: 10px; font-weight: 700; padding: 3px 9px; border-radius: 5px;
    letter-spacing: 0.5px; text-transform: uppercase;
  }

  .badge-denuvo { background: rgba(245,101,101,0.15); color: var(--red); }
  .badge-ubisoft { background: rgba(56,189,248,0.12); color: var(--cyan); }
  .badge-ea { background: rgba(245,166,35,0.12); color: var(--orange); }
  .badge-standard { background: rgba(61,214,140,0.12); color: var(--green); }

  .card h3 {
    font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700;
    margin-bottom: 6px; color: var(--text); letter-spacing: -0.2px; line-height: 1.3;
  }

  .card p { font-size: 12px; color: var(--muted); line-height: 1.55; margin-bottom: 14px; }

  .card-meta { display: flex; align-items: center; gap: 14px; font-size: 11px; color: var(--muted2); }
  .card-meta span { display: flex; align-items: center; gap: 4px; }

  .card-tags { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 12px; }
  .tag {
    background: rgba(255,255,255,0.04); border: 1px solid var(--border);
    border-radius: 4px; padding: 2px 8px; font-size: 10px; color: var(--muted);
  }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px);
    display: none; align-items: center; justify-content: center; z-index: 999; padding: 20px;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface); border: 1px solid var(--border2); border-radius: 20px;
    width: 100%; max-width: 680px; max-height: 88vh; overflow-y: auto;
    position: relative; animation: slideUp 0.25s ease;
  }

  @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

  .modal::-webkit-scrollbar { width: 4px; }
  .modal::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

  /* Modal hero image */
  .modal-thumb {
    width: 100%; aspect-ratio: 16/6; object-fit: cover;
    border-radius: 20px 20px 0 0; display: block;
  }

  .modal-thumb-placeholder {
    width: 100%; aspect-ratio: 16/6; border-radius: 20px 20px 0 0;
    background: linear-gradient(135deg, #1a1d26, #0d0f14);
    display: flex; align-items: center; justify-content: center; font-size: 64px;
  }

  .modal-header {
    padding: 20px 28px 18px; border-bottom: 1px solid var(--border);
    display: flex; align-items: flex-start; gap: 14px;
  }

  .modal-close {
    position: absolute; top: 14px; right: 14px; width: 32px; height: 32px;
    border-radius: 8px; background: rgba(0,0,0,0.5); border: 1px solid var(--border2);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 16px; transition: all 0.2s; z-index: 10;
  }
  .modal-close:hover { background: rgba(255,255,255,0.1); }

  .modal-title { font-family: 'Syne', sans-serif; font-size: 21px; font-weight: 800; letter-spacing: -0.5px; }
  .modal-subtitle { font-size: 13px; color: var(--muted); margin-top: 4px; }

  .modal-body { padding: 22px 28px 28px; }

  .step { display: flex; gap: 16px; margin-bottom: 26px; position: relative; }
  .step:not(:last-child)::after {
    content: ''; position: absolute; left: 19px; top: 44px; bottom: -10px;
    width: 1px; background: var(--border2);
  }

  .step-num {
    width: 40px; height: 40px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; font-weight: 700; font-family: 'Syne', sans-serif;
    flex-shrink: 0; border: 1px solid; position: relative; z-index: 1;
  }
  .step-num.done { background: rgba(61,214,140,0.1); border-color: rgba(61,214,140,0.3); color: var(--green); }
  .step-num.active { background: rgba(91,110,245,0.15); border-color: rgba(91,110,245,0.4); color: #818cf8; box-shadow: 0 0 0 4px rgba(91,110,245,0.08); }
  .step-num.idle { background: var(--surface2); border-color: var(--border2); color: var(--muted); }

  .step-content { flex: 1; padding-top: 8px; }
  .step-title { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
  .step-desc { font-size: 13px; color: var(--muted); line-height: 1.65; }

  .step-img {
    width: 100%; border-radius: 10px; margin-top: 12px;
    border: 1px solid var(--border2); display: block;
  }

  .code-block {
    background: rgba(0,0,0,0.45); border: 1px solid var(--border2); border-radius: 10px;
    padding: 13px 15px; font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 12.5px; color: #a5f3fc; margin-top: 12px; overflow-x: auto; line-height: 1.7;
  }
  .code-block .cm { color: var(--muted); }
  .code-block .kw { color: #c084fc; }
  .code-block .str { color: #86efac; }

  .info-box {
    background: rgba(56,189,248,0.07); border: 1px solid rgba(56,189,248,0.2);
    border-radius: 10px; padding: 12px 15px; font-size: 13px;
    color: var(--cyan); margin-top: 12px; line-height: 1.6;
  }
  .info-box strong { display: block; margin-bottom: 4px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; opacity: 0.65; }

  .modal-footer {
    padding: 14px 28px; border-top: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }

  .progress-bar { height: 4px; background: var(--border2); border-radius: 2px; flex: 1; margin-right: 14px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 2px; transition: width 0.3s; }

  .btn-primary {
    background: var(--accent); color: #fff; border: none; border-radius: 10px;
    padding: 10px 20px; font-size: 13px; font-weight: 600; font-family: 'Inter', sans-serif;
    cursor: pointer; transition: background 0.2s, transform 0.1s; white-space: nowrap;
  }
  .btn-primary:hover { background: #4a5de0; }
  .btn-primary:active { transform: scale(0.98); }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }
</style>
</head>

let currentStep = 0;
let activeGame = null;
let currentFilter = 'all';
let searchQuery = '';

function setFilter(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCards();
}

function filterCards() {
  searchQuery = document.getElementById('search-input').value.toLowerCase();
  renderCards();
}

function renderCards() {
  const grid = document.getElementById('card-grid');
  const filtered = games.filter(g => {
    const matchFilter = currentFilter === 'all' || g.category === currentFilter;
    const matchSearch = !searchQuery || g.title.toLowerCase().includes(searchQuery) || g.desc.toLowerCase().includes(searchQuery) || g.tags.some(t => t.toLowerCase().includes(searchQuery));
    return matchFilter && matchSearch;
  });

  document.getElementById('total-count').textContent = filtered.length;

  grid.innerHTML = filtered.map(g => `
    <div class="card" onclick="openModal(${g.id})">
      <div class="card-thumb-wrap" style="position:relative">
        <img class="card-thumb" src="${g.thumb}" alt="${g.title}" referrerpolicy="no-referrer"
          onerror="this.style.opacity='0';this.nextElementSibling.style.opacity='1'">
        <div class="card-thumb-placeholder" style="opacity:0;position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;background:linear-gradient(135deg,#1a1d26,#0d0f14);border-radius:0">
          <span style="font-size:32px">🎮</span>
          <span style="font-size:11px;color:var(--muted);text-align:center;padding:0 12px;font-weight:500">${g.title}</span>
        </div>
      </div>
      <div class="card-body">
        <div class="card-top">
          <span class="card-badge badge-${g.category}">${g.drm.toUpperCase()}</span>
          <span style="font-size:11px;color:var(--muted2)">${g.year}</span>
        </div>
        <h3>${g.title}</h3>
        <p>${g.desc}</p>
        <div class="card-meta">
          <span>📋 ${g.steps} steps</span>
          <span>🎮 ${g.genre}</span>
        </div>
        <div class="card-tags">
          ${g.tags.map(t => `<span class="tag">${t}</span>`).join('')}
        </div>
      </div>
    </div>
  `).join('');
}

function openModal(id) {
  const game = games.find(g => g.id === id);
  if (!game) return;
  activeGame = game;
  currentStep = 0;

  // Thumbnail in modal
  const thumbWrap = document.getElementById('modal-thumb-wrap');
  thumbWrap.innerHTML = `
    <div style="position:relative;width:100%;aspect-ratio:16/6;overflow:hidden;background:#0d0f14;border-radius:20px 20px 0 0">
      <img src="${game.thumb}" alt="${game.title}" class="modal-thumb"
        referrerpolicy="no-referrer"
        onerror="this.style.opacity='0';this.nextElementSibling.style.opacity='1'" style="transition:opacity 0.3s">
      <div style="opacity:0;transition:opacity 0.3s;position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;background:linear-gradient(135deg,#1a1d26,#0d0f14)">
        <span style="font-size:48px">🎮</span>
        <span style="font-size:14px;color:var(--muted);font-weight:600">${game.title}</span>
      </div>
    </div>
  `;

  document.getElementById('modal-title').textContent = game.title;
  document.getElementById('modal-subtitle').textContent = `${game.steps} steps · ${game.genre} · ${game.drm.toUpperCase()} Protection`;
  document.getElementById('modal-btn').textContent = 'Start Guide →';

  renderSteps();
  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function renderSteps() {
  if (!activeGame) return;
  const body = document.getElementById('modal-body');
  body.innerHTML = activeGame.steps_data.map((step, i) => {
    let statusClass = i < currentStep ? 'done' : (i === currentStep ? 'active' : 'idle');
    const numContent = i < currentStep ? '✓' : (i + 1);
    return `
      <div class="step">
        <div class="step-num ${statusClass}">${numContent}</div>
        <div class="step-content">
          <div class="step-title">${step.title}</div>
          <div class="step-desc">${step.desc}</div>
          ${step.code ? `<div class="code-block">${step.code}</div>` : ''}
          ${step.info ? `<div class="info-box"><strong>Note</strong>${step.info}</div>` : ''}
        </div>
      </div>
    `;
  }).join('');

  const total = activeGame.steps_data.length;
  const pct = total ? Math.round((currentStep / total) * 100) : 0;
  document.getElementById('modal-progress').style.width = pct + '%';
  document.getElementById('modal-progress-label').textContent = `${currentStep} / ${total} steps`;

  const btn = document.getElementById('modal-btn');
  if (currentStep === 0) btn.textContent = 'Start Guide →';
  else if (currentStep >= total) btn.textContent = '✓ Completed!';
  else btn.textContent = `Next Step (${currentStep + 1}/${total}) →`;

  setTimeout(() => {
    const steps = document.querySelectorAll('.step');
    if (steps[currentStep]) steps[currentStep].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }, 50);
}

function nextStep() {
  if (activeGame && currentStep < activeGame.steps_data.length) {
    currentStep++;
    renderSteps();
  }
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

function closeModalOutside(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

renderCards();
</script>
